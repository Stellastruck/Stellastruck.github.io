<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>表单</title>
</head>
<body>
    <form action="">
        昵称:<input type="text" name=""><br>
        密码:<input type="password" name=""><br>
        邮箱：<input type="email" name="">
        <select name="" id="">
            <option value="">qq.com</option>
            <option value="">163.com</option>
            <option value="">gmail.com</option>
        </select><br>
        性别:<input type="radio" name="gender" checked value="男">男
             <input type="radio" name="gender" value="女">女<br>
        爱好:<input type="checkbox" name="hobby" value="旅游">旅游
             <input type="checkbox" name="hobby" value="音乐">音乐
             <input type="checkbox" name="hobby" value="运动">运动
        个人简介：<br>
        <textarea name="" id="" cols="40" rows="10"></textarea><br>
        上传个人照片：<br>
        <input type="file" name="" id="">
        <hr>
        <center>
            <input type="submit" value="立即注册">
        </center>     
    </form>
    
</body>
</html>
